110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"f7b4f0d7-301b-4fe5-8c7c-dd07490e2d78\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"e6f50317-673a-4b46-b2b2-75adb728ef8b\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{margin:0;padding:0;box-sizing:border-box;}\n  body{background:#ECEBD9;}\n  ::selection{background:#A0461E;color:#FBFBDF;}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"background:#ECEBD9;min-height:100vh;padding:56px 24px;font-family:'Hanken Grotesk',sans-serif;color:#3B2418;\">\n<div style=\"max-width:880px;margin:0 auto;display:flex;flex-direction:column;gap:24px;\">\n\n<!-- ============ COVER ============ -->\n<section style=\"background:#FBFBDF;border-radius:6px;overflow:hidden;box-shadow:0 1px 3px rgba(59,36,24,.12);padding:72px 64px 64px;position:relative;\">\n  <div style=\"display:flex;justify-content:space-between;align-items:flex-start;font-family:'Hanken Grotesk';font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#A0461E;font-weight:600;\">\n    <span>Manual de Marca<\u002Fspan>\n    <span>v0.1 — Início<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;align-items:center;gap:28px;margin:56px 0 48px;\">\n    <img src=\"7484d48f-faf9-402b-8d2e-6712b2168b44\" alt=\"Ilha Grande Hostel\" style=\"width:300px;height:300px;border-radius:8px;display:block;\">\n  <\u002Fdiv>\n  <h1 style=\"font-family:'Fredoka';font-weight:600;font-size:52px;line-height:1.0;text-align:center;color:#A0461E;letter-spacing:-.01em;\">Ilha Grande Hostel<\u002Fh1>\n  <p style=\"text-align:center;font-size:16px;color:#7A5A44;margin-top:14px;max-width:480px;margin-left:auto;margin-right:auto;line-height:1.5;\">Guia rápido de identidade visual e tom de voz — a base para que tudo o que a marca cria pareça da mesma casa.<\u002Fp>\n<\u002Fsection>\n\n<!-- ============ 01 ESSÊNCIA ============ -->\n<section style=\"background:#FBFBDF;border-radius:6px;box-shadow:0 1px 3px rgba(59,36,24,.12);padding:56px 64px;\">\n  <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:32px;\">\n    <span style=\"font-family:'Fredoka';font-weight:600;font-size:15px;color:#A0461E;\">01<\u002Fspan>\n    <h2 style=\"font-family:'Fredoka';font-weight:600;font-size:30px;color:#3B2418;\">A essência<\u002Fh2>\n  <\u002Fdiv>\n  <p style=\"font-size:20px;line-height:1.55;color:#5C4232;max-width:620px;margin-bottom:40px;\">Um refúgio simples e acolhedor numa ilha de mata atlântica e mar. A marca é a casa de praia onde todo mundo se sente em casa: <strong style=\"color:#A0461E;\">caseira, descalça e calorosa<\u002Fstrong>, nunca luxuosa nem corporativa.<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:#E6DEC6;border-radius:6px;overflow:hidden;\">\n    <div style=\"background:#FBFBDF;padding:28px 30px;\">\n      <div style=\"font-family:'Hanken Grotesk';font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#A0461E;font-weight:600;margin-bottom:10px;\">Somos<\u002Fdiv>\n      <p style=\"font-size:16px;line-height:1.6;color:#5C4232;\">Acolhedores · descontraídos · naturais · honestos · próximos · pé na areia<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#FBFBDF;padding:28px 30px;\">\n      <div style=\"font-family:'Hanken Grotesk';font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#9A8268;font-weight:600;margin-bottom:10px;\">Não somos<\u002Fdiv>\n      <p style=\"font-size:16px;line-height:1.6;color:#8A7560;\">Luxuosos · formais · frios · forçados · genéricos · de salto alto<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-top:32px;\">\n    <span style=\"background:#A0461E;color:#FBFBDF;font-family:'Fredoka';font-weight:500;font-size:14px;padding:8px 18px;border-radius:100px;\">#descalço<\u002Fspan>\n    <span style=\"background:#2F5135;color:#FBFBDF;font-family:'Fredoka';font-weight:500;font-size:14px;padding:8px 18px;border-radius:100px;\">#mataatlântica<\u002Fspan>\n    <span style=\"background:#2C6E72;color:#FBFBDF;font-family:'Fredoka';font-weight:500;font-size:14px;padding:8px 18px;border-radius:100px;\">#vidademochileiro<\u002Fspan>\n    <span style=\"background:#C9893F;color:#FBFBDF;font-family:'Fredoka';font-weight:500;font-size:14px;padding:8px 18px;border-radius:100px;\">#suncatcher<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 02 LOGO ============ -->\n<section style=\"background:#FBFBDF;border-radius:6px;box-shadow:0 1px 3px rgba(59,36,24,.12);padding:56px 64px;\">\n  <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:32px;\">\n    <span style=\"font-family:'Fredoka';font-weight:600;font-size:15px;color:#A0461E;\">02<\u002Fspan>\n    <h2 style=\"font-family:'Fredoka';font-weight:600;font-size:30px;color:#3B2418;\">O logo<\u002Fh2>\n  <\u002Fdiv>\n  <p style=\"font-size:17px;line-height:1.6;color:#5C4232;max-width:620px;margin-bottom:36px;\">A cabana com telhado em A e janelinha é o coração da marca. Traço arredondado e desenhado à mão — proteção, aconchego e a chegada em casa. Use sempre com respiro generoso ao redor.<\u002Fp>\n\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;\">\n    <div style=\"background:#FBFBDF;border:1px solid #E6DEC6;border-radius:6px;padding:32px;display:flex;flex-direction:column;align-items:center;gap:16px;\">\n      <img src=\"7484d48f-faf9-402b-8d2e-6712b2168b44\" style=\"width:160px;height:160px;border-radius:6px;\">\n      <div style=\"font-family:'Hanken Grotesk';font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#9A8268;font-weight:600;\">Versão principal · sobre creme<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#A0461E;border-radius:6px;padding:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;\">\n      <div style=\"width:160px;height:160px;border-radius:6px;background:#A0461E;border:2px dashed rgba(251,251,223,.4);display:flex;align-items:center;justify-content:center;text-align:center;\">\n        <span style=\"font-family:'Fredoka';font-weight:600;font-size:18px;color:#FBFBDF;line-height:1.3;\">Versão<br>creme sólido<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-family:'Hanken Grotesk';font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(251,251,223,.7);font-weight:600;\">Reversa · a produzir<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n    <div style=\"background:#FBFBDF;border:1px solid #E6DEC6;border-radius:6px;padding:24px 28px;\">\n      <div style=\"font-family:'Hanken Grotesk';font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#2F5135;font-weight:600;margin-bottom:12px;\">✓ Sim<\u002Fdiv>\n      <ul style=\"list-style:none;display:flex;flex-direction:column;gap:8px;font-size:14px;line-height:1.45;color:#5C4232;\">\n        <li>Respiro = altura da janelinha em todos os lados<\u002Fli>\n        <li>Sobre creme, terracota ou foto com pouca informação<\u002Fli>\n        <li>Tamanho mínimo: ícone 32px / completo 90px largura<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div style=\"background:#FBFBDF;border:1px solid #E6DEC6;border-radius:6px;padding:24px 28px;\">\n      <div style=\"font-family:'Hanken Grotesk';font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#A0461E;font-weight:600;margin-bottom:12px;\">✕ Não<\u002Fdiv>\n      <ul style=\"list-style:none;display:flex;flex-direction:column;gap:8px;font-size:14px;line-height:1.45;color:#8A7560;\">\n        <li>Esticar, girar ou trocar as cores<\u002Fli>\n        <li>Adicionar sombras, contornos ou gradientes<\u002Fli>\n        <li>Pôr sobre fundo cheio sem contraste<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 03 COR ============ -->\n<section style=\"background:#FBFBDF;border-radius:6px;box-shadow:0 1px 3px rgba(59,36,24,.12);padding:56px 64px;\">\n  <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:32px;\">\n    <span style=\"font-family:'Fredoka';font-weight:600;font-size:15px;color:#A0461E;\">03<\u002Fspan>\n    <h2 style=\"font-family:'Fredoka';font-weight:600;font-size:30px;color:#3B2418;\">Cores<\u002Fh2>\n  <\u002Fdiv>\n  <p style=\"font-size:17px;line-height:1.6;color:#5C4232;max-width:620px;margin-bottom:36px;\">Terracota e creme são a marca — devem dominar. Mata, mar e areia entram em pequenas doses para dar ar de ilha sem virar arco-íris.<\u002Fp>\n\n  <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:14px;\">\n    <div style=\"border-radius:6px;overflow:hidden;border:1px solid #E6DEC6;\">\n      <div style=\"background:#A0461E;height:120px;\"><\u002Fdiv>\n      <div style=\"padding:16px 18px;background:#FBFBDF;\">\n        <div style=\"font-family:'Fredoka';font-weight:600;font-size:16px;color:#3B2418;\">Terracota<\u002Fdiv>\n        <div style=\"font-size:13px;color:#9A8268;font-family:'Hanken Grotesk';margin-top:2px;\">#A0461E · principal<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-radius:6px;overflow:hidden;border:1px solid #E6DEC6;\">\n      <div style=\"background:#FBFBDF;height:120px;border-bottom:1px solid #E6DEC6;\"><\u002Fdiv>\n      <div style=\"padding:16px 18px;background:#FBFBDF;\">\n        <div style=\"font-family:'Fredoka';font-weight:600;font-size:16px;color:#3B2418;\">Creme<\u002Fdiv>\n        <div style=\"font-size:13px;color:#9A8268;font-family:'Hanken Grotesk';margin-top:2px;\">#FBFBDF · base / fundo<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;\">\n    <div style=\"border-radius:6px;overflow:hidden;border:1px solid #E6DEC6;\">\n      <div style=\"background:#2F5135;height:88px;\"><\u002Fdiv>\n      <div style=\"padding:14px 16px;background:#FBFBDF;\">\n        <div style=\"font-family:'Fredoka';font-weight:600;font-size:14px;color:#3B2418;\">Mata<\u002Fdiv>\n        <div style=\"font-size:12px;color:#9A8268;font-family:'Hanken Grotesk';\">#2F5135<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-radius:6px;overflow:hidden;border:1px solid #E6DEC6;\">\n      <div style=\"background:#2C6E72;height:88px;\"><\u002Fdiv>\n      <div style=\"padding:14px 16px;background:#FBFBDF;\">\n        <div style=\"font-family:'Fredoka';font-weight:600;font-size:14px;color:#3B2418;\">Mar<\u002Fdiv>\n        <div style=\"font-size:12px;color:#9A8268;font-family:'Hanken Grotesk';\">#2C6E72<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-radius:6px;overflow:hidden;border:1px solid #E6DEC6;\">\n      <div style=\"background:#C9893F;height:88px;\"><\u002Fdiv>\n      <div style=\"padding:14px 16px;background:#FBFBDF;\">\n        <div style=\"font-family:'Fredoka';font-weight:600;font-size:14px;color:#3B2418;\">Areia<\u002Fdiv>\n        <div style=\"font-size:12px;color:#9A8268;font-family:'Hanken Grotesk';\">#C9893F<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-radius:6px;overflow:hidden;border:1px solid #E6DEC6;\">\n      <div style=\"background:#3B2418;height:88px;\"><\u002Fdiv>\n      <div style=\"padding:14px 16px;background:#FBFBDF;\">\n        <div style=\"font-family:'Fredoka';font-weight:600;font-size:14px;color:#3B2418;\">Tinta<\u002Fdiv>\n        <div style=\"font-size:12px;color:#9A8268;font-family:'Hanken Grotesk';\">#3B2418<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <p style=\"font-size:13px;color:#9A8268;font-family:'Hanken Grotesk';margin-top:20px;line-height:1.5;\">Proporção sugerida: ~60% creme · ~30% terracota · ~10% apoio (mata / mar / areia). Tinta só para texto.<\u002Fp>\n<\u002Fsection>\n\n<!-- ============ 04 TIPOGRAFIA ============ -->\n<section style=\"background:#FBFBDF;border-radius:6px;box-shadow:0 1px 3px rgba(59,36,24,.12);padding:56px 64px;\">\n  <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:32px;\">\n    <span style=\"font-family:'Fredoka';font-weight:600;font-size:15px;color:#A0461E;\">04<\u002Fspan>\n    <h2 style=\"font-family:'Fredoka';font-weight:600;font-size:30px;color:#3B2418;\">Tipografia<\u002Fh2>\n  <\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;gap:14px;\">\n    <div style=\"background:#FBFBDF;border:1px solid #E6DEC6;border-radius:6px;padding:32px 36px;\">\n      <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px;\">\n        <span style=\"font-family:'Fredoka';font-weight:600;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:#A0461E;\">Títulos · Fredoka<\u002Fspan>\n        <span style=\"font-family:'Hanken Grotesk';font-size:13px;color:#9A8268;\">arredondada, amistosa<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-family:'Fredoka';font-weight:600;font-size:46px;color:#3B2418;line-height:1.05;letter-spacing:-.01em;\">Bem-vindo<br>à ilha<\u002Fdiv>\n      <div style=\"font-family:'Fredoka';font-weight:400;font-size:18px;color:#7A5A44;margin-top:16px;letter-spacing:.02em;\">AaBbCc 0123 — combina com o traço do logo<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#FBFBDF;border:1px solid #E6DEC6;border-radius:6px;padding:32px 36px;\">\n      <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px;\">\n        <span style=\"font-family:'Fredoka';font-weight:600;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:#A0461E;\">Texto · Hanken Grotesk<\u002Fspan>\n        <span style=\"font-family:'Hanken Grotesk';font-size:13px;color:#9A8268;\">limpa, legível<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"font-family:'Hanken Grotesk';font-size:18px;line-height:1.6;color:#5C4232;max-width:560px;\">Para legendas, e-mails e descrições. Mantém tudo claro e respirável, deixando o Fredoka brilhar nos destaques. Pesos 400 e 600.<\u002Fp>\n      <div style=\"font-family:'Hanken Grotesk';font-size:15px;color:#7A5A44;margin-top:16px;\">AaBbCcDdEeFf 0123456789 &amp; ! ?<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 05 FOTOGRAFIA ============ -->\n<section style=\"background:#FBFBDF;border-radius:6px;box-shadow:0 1px 3px rgba(59,36,24,.12);padding:56px 64px;\">\n  <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:32px;\">\n    <span style=\"font-family:'Fredoka';font-weight:600;font-size:15px;color:#A0461E;\">05<\u002Fspan>\n    <h2 style=\"font-family:'Fredoka';font-weight:600;font-size:30px;color:#3B2418;\">Fotografia &amp; feed<\u002Fh2>\n  <\u002Fdiv>\n  <p style=\"font-size:17px;line-height:1.6;color:#5C4232;max-width:620px;margin-bottom:36px;\">Luz natural, tons quentes e um quê analógico/sol. Momentos reais de gente, mata e mar — nada de banco de imagens. O feed é a vitrine: alterna fotos com placas em terracota.<\u002Fp>\n\n  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:8px;border-radius:8px;overflow:hidden;\">\n    <div style=\"aspect-ratio:1;background:repeating-linear-gradient(45deg,#E9DFC4,#E9DFC4 8px,#E3D6B6 8px,#E3D6B6 16px);display:flex;align-items:flex-end;padding:12px;\"><span style=\"font-family:monospace;font-size:10px;color:#8A7560;\">praia · sol<\u002Fspan><\u002Fdiv>\n    <div style=\"aspect-ratio:1;background:#A0461E;display:flex;align-items:center;justify-content:center;text-align:center;padding:14px;\"><span style=\"font-family:'Fredoka';font-weight:600;font-size:20px;color:#FBFBDF;line-height:1.15;\">Sua casa<br>na ilha<\u002Fspan><\u002Fdiv>\n    <div style=\"aspect-ratio:1;background:repeating-linear-gradient(45deg,#E9DFC4,#E9DFC4 8px,#E3D6B6 8px,#E3D6B6 16px);display:flex;align-items:flex-end;padding:12px;\"><span style=\"font-family:monospace;font-size:10px;color:#8A7560;\">galera · rede<\u002Fspan><\u002Fdiv>\n    <div style=\"aspect-ratio:1;background:#2F5135;display:flex;align-items:center;justify-content:center;text-align:center;padding:14px;\"><span style=\"font-family:monospace;font-size:10px;color:rgba(251,251,223,.85);\">trilha · mata<\u002Fspan><\u002Fdiv>\n    <div style=\"aspect-ratio:1;background:repeating-linear-gradient(45deg,#E9DFC4,#E9DFC4 8px,#E3D6B6 8px,#E3D6B6 16px);display:flex;align-items:flex-end;padding:12px;\"><span style=\"font-family:monospace;font-size:10px;color:#8A7560;\">café · manhã<\u002Fspan><\u002Fdiv>\n    <div style=\"aspect-ratio:1;background:#2C6E72;display:flex;align-items:center;justify-content:center;text-align:center;padding:14px;\"><span style=\"font-family:'Fredoka';font-weight:600;font-size:16px;color:#FBFBDF;line-height:1.2;\">dica<br>do dia<\u002Fspan><\u002Fdiv>\n    <div style=\"aspect-ratio:1;background:repeating-linear-gradient(45deg,#E9DFC4,#E9DFC4 8px,#E3D6B6 8px,#E3D6B6 16px);display:flex;align-items:flex-end;padding:12px;\"><span style=\"font-family:monospace;font-size:10px;color:#8A7560;\">quarto · luz<\u002Fspan><\u002Fdiv>\n    <div style=\"aspect-ratio:1;background:repeating-linear-gradient(45deg,#E9DFC4,#E9DFC4 8px,#E3D6B6 8px,#E3D6B6 16px);display:flex;align-items:flex-end;padding:12px;\"><span style=\"font-family:monospace;font-size:10px;color:#8A7560;\">pôr do sol<\u002Fspan><\u002Fdiv>\n    <div style=\"aspect-ratio:1;background:#C9893F;display:flex;align-items:center;justify-content:center;text-align:center;padding:14px;\"><span style=\"font-family:monospace;font-size:10px;color:#3B2418;\">barco · mar<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ 06 VOZ ============ -->\n<section style=\"background:#A0461E;border-radius:6px;box-shadow:0 1px 3px rgba(59,36,24,.12);padding:56px 64px;color:#FBFBDF;\">\n  <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:32px;\">\n    <span style=\"font-family:'Fredoka';font-weight:600;font-size:15px;color:#F0C7A0;\">06<\u002Fspan>\n    <h2 style=\"font-family:'Fredoka';font-weight:600;font-size:30px;color:#FBFBDF;\">Voz &amp; tom<\u002Fh2>\n  <\u002Fdiv>\n  <p style=\"font-size:20px;line-height:1.55;max-width:600px;margin-bottom:36px;color:#FBEFDD;\">Falamos como um amigo que já mora na ilha: caloroso, leve e sem firula. Tratamos por <strong>você<\u002Fstrong>, usamos português brasileiro descontraído e um emoji aqui e ali — sem exagero.<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;\">\n    <div style=\"background:rgba(251,251,223,.12);border-radius:6px;padding:24px 26px;\">\n      <div style=\"font-family:'Hanken Grotesk';font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;color:#F0C7A0;margin-bottom:14px;\">Assim sim<\u002Fdiv>\n      <p style=\"font-family:'Fredoka';font-weight:500;font-size:18px;line-height:1.4;\">“Chega, larga a mochila e senta na rede — a ilha espera por você. 🌿”<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:rgba(251,251,223,.12);border-radius:6px;padding:24px 26px;\">\n      <div style=\"font-family:'Hanken Grotesk';font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;color:#F0C7A0;margin-bottom:14px;\">Assim não<\u002Fdiv>\n      <p style=\"font-family:'Fredoka';font-weight:500;font-size:18px;line-height:1.4;color:#E6BFA0;\">“Oferecemos acomodações de excelência com elevados padrões de qualidade.”<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<div style=\"text-align:center;padding:24px 0 8px;font-family:'Hanken Grotesk';font-size:13px;color:#9A8268;\">Ilha Grande Hostel · Manual de marca — início · base inicial sujeita a evolução<\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
